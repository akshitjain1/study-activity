name: Study Activity Bot

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run bot
        run: python bot.py

      - name: Commit changes
        run: |
          git config --global user.name "Akshit Jain"
          git config --global user.email "akshitjainonly1@gmail.com"
          git add .
          git commit -m "Daily study update" || echo "No changes to commit"
          git push
